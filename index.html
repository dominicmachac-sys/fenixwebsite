<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="contact-form">
        <input type="text" id="fn" name="name" placeholder="Your Name">
        <input type="email" id="fp" name="email" placeholder="Your Email">
        <input type="text" id="fd" name="data" placeholder="Data">
        <input type="text" id="ft" name="type" placeholder="Type">
        <input type="text" id="fgp" name="group" placeholder="Group">
        <input type="text" id="fge" name="genre" placeholder="Genre">
        <input type="text" id="fnt" name="note" placeholder="Note">
        <button type="submit">Send</button>
    </form>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('https://formspree.io/f/mlgpllwq', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    alert('Message sent!');
                } else {
                    alert('There was a problem.');
                }
            });
        });
    </script>
</body>
</html>
